<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue vs Red: Arsenal Expanded</title>
    <style>
        body { background-color: #0a0a1a; color: white; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        
        #gameContainer {
            position: relative; width: 800px; height: 600px; margin: 0 auto;
            border: 3px solid #555; box-shadow: 0 0 20px rgba(157, 23, 77, 0.5);
            background: linear-gradient(to bottom, #0f172a 0%, #1e1b4b 40%, #581c87 80%, #9d174d 100%);
            overflow: hidden;
        }

        canvas { display: block; }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); display: flex; flex-direction: column;
            justify-content: center; align-items: center; display: none; 
        }

        h1 { font-size: 48px; margin-bottom: 10px; color: #ff00ff; text-shadow: 2px 2px 0 #00ffff; }
        h2 { color: #fff; margin-bottom: 20px; }

        .menu-btn {
            background-color: #222; color: white; border: 2px solid #00ffff;
            padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer;
            font-weight: bold; transition: 0.2s; text-transform: uppercase; width: 250px;
        }
        .menu-btn:hover { background-color: #00ffff; color: #000; }

        .color-row { margin: 15px 0; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 15px; max-width: 300px; }
        .color-btn { width: 40px; height: 40px; border: 2px solid white; cursor: pointer; transition: transform 0.1s; }
        .color-btn:hover { transform: scale(1.1); }
        
        .settings-panel { background: rgba(0,0,0,0.8); padding: 20px; border: 1px solid #555; text-align: left; width: 350px; }
        .settings-panel p { margin: 8px 0; font-size: 16px; color: #ccc; }
        
        #previewBox { width: 40px; height: 40px; border: 2px solid #fff; margin-bottom: 20px; }
        input[type=range] { width: 100%; margin: 10px 0; cursor: pointer; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="mainMenu" class="screen" style="display: flex;">
            <h1>THE ARENA</h1>
            <button class="menu-btn" onclick="startGame()">Play</button>
            <button class="menu-btn" onclick="showScreen('customizeMenu')">Customize</button>
            <button class="menu-btn" onclick="showScreen('settingsMenu')">Options / Settings</button>
        </div>

        <div id="customizeMenu" class="screen">
            <h2>Customize Character</h2>
            <div id="previewBox" style="background-color: blue;"></div>
            <span>Select Body Color:</span>
            <div class="color-row">
                <div class="color-btn" style="background: blue;" onclick="setBodyColor('blue')"></div>
                <div class="color-btn" style="background: #00ff00;" onclick="setBodyColor('#00ff00')"></div>
                <div class="color-btn" style="background: #ff00ff;" onclick="setBodyColor('#ff00ff')"></div>
                <div class="color-btn" style="background: white;" onclick="setBodyColor('white')"></div>
                <div class="color-btn" style="background: #ff8800;" onclick="setBodyColor('#ff8800')"></div>
                <div class="color-btn" style="background: #ffff00;" onclick="setBodyColor('#ffff00')"></div>
                <div class="color-btn" style="background: #00ffff;" onclick="setBodyColor('#00ffff')"></div>
                <div class="color-btn" style="background: #8800ff;" onclick="setBodyColor('#8800ff')"></div>
            </div>
            <button class="menu-btn" onclick="showScreen('mainMenu')" style="margin-top: 30px;">Back to Menu</button>
        </div>

        <div id="settingsMenu" class="screen">
            <h2>Options & Settings</h2>
            <div class="settings-panel">
                <h3 style="color: #ff00ff; margin-top: 0;">Difficulty</h3>
                <p>Enemy Level: <strong id="diffLabel" style="color: white;">Normal</strong></p>
                <input type="range" id="diffSlider" min="1" max="5" value="3" onchange="changeDifficulty()" oninput="changeDifficulty()">
                <hr style="border-color: #444; margin: 15px 0;">
                <h3 style="color: #00ffff;">Controls</h3>
                <p><strong>Move:</strong> WASD / Arrows</p>
                <p><strong>Jump:</strong> W / Up Arrow</p>
                <p><strong>Shoot:</strong> Z or J</p>
                <p><strong>Shield:</strong> X or K</p>
                <p><strong>Dash:</strong> C or L</p>
                <p><strong>Ultimate:</strong> Q</p>
                <p><strong>Pause:</strong> P</p>
            </div>
            <button class="menu-btn" onclick="returnFromSettings()">Back</button>
        </div>

        <div id="pauseMenu" class="screen">
            <h2>GAME PAUSED</h2>
            <button class="menu-btn" onclick="togglePause()">Resume</button>
            <button class="menu-btn" onclick="showScreen('settingsMenu')">Settings</button>
            <button class="menu-btn" onclick="quitToMenu()">Return to Main Menu</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'MENU'; 
let previousState = 'MENU'; 
let customBodyColor = 'blue';
let difficultyLevel = 3; 
let aiSpeedMult = 1.0;
let aiCooldownMult = 1.0;

function showScreen(screenId) {
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('customizeMenu').style.display = 'none';
    document.getElementById('settingsMenu').style.display = 'none';
    document.getElementById('pauseMenu').style.display = 'none';
    if (screenId) document.getElementById(screenId).style.display = 'flex';
}

function startGame() { gameState = 'PLAYING'; showScreen(null); resetGame(); }
function togglePause() {
    if (gameState === 'PLAYING') { gameState = 'PAUSED'; showScreen('pauseMenu'); } 
    else if (gameState === 'PAUSED') { gameState = 'PLAYING'; showScreen(null); }
}
function quitToMenu() { gameState = 'MENU'; showScreen('mainMenu'); }
function returnFromSettings() { if (gameState === 'PAUSED') showScreen('pauseMenu'); else showScreen('mainMenu'); }
function setBodyColor(color) { customBodyColor = color; document.getElementById('previewBox').style.backgroundColor = color; }

function changeDifficulty() {
    difficultyLevel = parseInt(document.getElementById('diffSlider').value);
    const labels = ["Very Easy", "Easy", "Normal", "Hard", "Insane"];
    document.getElementById('diffLabel').innerText = labels[difficultyLevel - 1];
    aiSpeedMult = 0.7 + (difficultyLevel * 0.1);    
    aiCooldownMult = 1.4 - (difficultyLevel * 0.2); 
}

const MOVE_SPEED = 180; 
const GRAVITY = 900;    
const JUMP_VELOCITY = -350; 
const BULLET_SPEED = 500; 
const DASH_SPEED = 600;
const DASH_DURATION = 0.15;
const DASH_COOLDOWN = 1.5;

let keys = {};
let prevKeys = {}; 
window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key.toLowerCase() === 'p' && !prevKeys['p']) togglePause();
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

let player, enemy, bullets, platforms, lastTime;
let weaponDrops = [];
let nextWeaponTimer = 5;

function resetGame() {
    player = { x: 50, y: 500, w: 10, h: 10, vx: 0, vy: 0, hp: 5, facing: 'right', shielding: false, cooldown: 0, dashTime: 0, dashCd: 0, color: customBodyColor, jumps: 0, onWall: 0, blocks: 0, weapon: 'default', ammo: 0 };
    enemy = { x: 740, y: 500, w: 10, h: 10, vx: 0, vy: 0, hp: 5, facing: 'left', shielding: false, cooldown: 0, color: 'red', stateTimer: 0, jumps: 0, onWall: 0, blocks: 0, weapon: 'default', ammo: 0 };
    bullets = [];
    weaponDrops = [];
    nextWeaponTimer = 8;
    
    platforms = [
        { x: 0, y: 570, w: 800, h: 30 }, 
        { x: 100, y: 460, w: 100, h: 10 }, { x: 350, y: 480, w: 100, h: 10 }, { x: 600, y: 460, w: 100, h: 10 },
        { x: 220, y: 350, w: 100, h: 10 }, { x: 480, y: 350, w: 100, h: 10 },
        { x: 350, y: 240, w: 100, h: 10 }, { x: 80, y: 150, w: 100, h: 10 }, { x: 620, y: 150, w: 100, h: 10 }
    ];
}

function rectIntersect(r1, r2) { return !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y); }

function updatePhysics(entity, dt) {
    entity.x += entity.vx * dt;
    if (entity.dashTime <= 0) entity.vy += GRAVITY * dt;
    entity.y += entity.vy * dt;
    entity.grounded = false; entity.onWall = 0; 

    if (entity.x <= 0) { entity.x = 0; entity.onWall = -1; }
    if (entity.x + entity.w >= canvas.width) { entity.x = canvas.width - entity.w; entity.onWall = 1; }

    platforms.forEach(p => {
        if (rectIntersect(entity, p) && entity.vy > 0 && entity.y + entity.h - (entity.vy * dt) <= p.y + 10) {
            entity.y = p.y - entity.h; entity.vy = 0; entity.grounded = true; entity.jumps = 0; 
        }
    });
    if (entity.y < 0) { entity.y = 0; entity.vy = 0; }
}

function fireBullet(x, y, vx, vy, owner, isUlt) {
    bullets.push({ 
        x: x, y: y, w: isUlt ? 40 : 10, h: isUlt ? 20 : 3, 
        vx: vx, vy: vy, owner: owner, damage: isUlt ? 3 : 1, isUltimate: isUlt 
    });
}

function shoot(entity) {
    if (entity.cooldown <= 0) {
        let spawnX = entity.facing === 'right' ? entity.x + 12 : entity.x - 12;
        let baseVx = entity.facing === 'right' ? BULLET_SPEED : -BULLET_SPEED;
        let aiMult = (entity === enemy) ? aiCooldownMult : 1;

        if (entity.weapon === 'shotgun' && entity.ammo > 0) {
            fireBullet(spawnX, entity.y + 3, baseVx, 0, entity.color, false);
            fireBullet(spawnX, entity.y + 3, baseVx, -50, entity.color, false);
            fireBullet(spawnX, entity.y + 3, baseVx, 50, entity.color, false);
            entity.ammo--;
            entity.cooldown = 0.7 * aiMult;
            if (entity.ammo <= 0) entity.weapon = 'default';
            
        } else if (entity.weapon === 'minigun' && entity.ammo > 0) {
            let spreadVy = (Math.random() - 0.5) * 60; // Bullet spread for machine gun feel
            fireBullet(spawnX, entity.y + 3, baseVx * 1.2, spreadVy, entity.color, false);
            entity.ammo--;
            entity.cooldown = 0.08 * aiMult; // Insanely fast fire rate
            if (entity.ammo <= 0) entity.weapon = 'default';
            
        } else if (entity.weapon === 'sniper' && entity.ammo > 0) {
            fireBullet(spawnX, entity.y + 3, baseVx * 4, 0, entity.color, false); // Lightning fast bullet
            entity.ammo--;
            entity.cooldown = 1.0 * aiMult; // Long recovery after firing sniper
            if (entity.ammo <= 0) entity.weapon = 'default';
            
        } else {
            // Default Gun
            fireBullet(spawnX, entity.y + 3, baseVx, 0, entity.color, false);
            entity.cooldown = 0.4 * aiMult;
        }
    }
}

function fireUltimate(entity) {
    let spawnX = entity.facing === 'right' ? entity.x + 15 : entity.x - 45;
    let baseVx = entity.facing === 'right' ? BULLET_SPEED * 1.5 : -BULLET_SPEED * 1.5;
    fireBullet(spawnX, entity.y - 5, baseVx, 0, entity.color, true);
    entity.blocks = 0; 
}

function getShieldRect(entity) {
    if (entity.facing === 'right') return { x: entity.x + 15, y: entity.y - 3, w: 3, h: 16 };
    if (entity.facing === 'left') return { x: entity.x - 8, y: entity.y - 3, w: 3, h: 16 };
    if (entity.facing === 'up') return { x: entity.x - 3, y: entity.y - 8, w: 16, h: 3 };
    if (entity.facing === 'down') return { x: entity.x - 3, y: entity.y + 15, w: 16, h: 3 };
}

function updateAI(dt) {
    enemy.stateTimer -= dt;
    enemy.vx = 0; enemy.shielding = false;

    if (enemy.onWall !== 0 && !enemy.grounded && enemy.vy > 0 && Math.random() < 0.05) {
        enemy.vy = JUMP_VELOCITY * 0.9; enemy.facing = enemy.onWall === -1 ? 'right' : 'left';
    }

    let incoming = bullets.find(b => b.owner === player.color && Math.abs(b.y - enemy.y) < 20 && Math.abs(b.x - enemy.x) < 150);
    
    if (incoming && !incoming.isUltimate) { 
        if (incoming.x < enemy.x) enemy.facing = 'left';
        if (Math.random() < 0.4 && enemy.grounded) enemy.vy = JUMP_VELOCITY;
        else enemy.shielding = true;
    } else {
        if (enemy.stateTimer <= 0) {
            enemy.stateTimer = Math.random();
            let action = Math.random();
            if (action < 0.4) enemy.facing = 'left';
            else if (action < 0.8) enemy.facing = 'right';
            else if (enemy.grounded) { enemy.vy = JUMP_VELOCITY; enemy.jumps = 1; }
        }
        
        if (enemy.facing === 'left') enemy.vx = -MOVE_SPEED * aiSpeedMult;
        if (enemy.facing === 'right') enemy.vx = MOVE_SPEED * aiSpeedMult;

        let lineOfSight = ((enemy.facing === 'left' && player.x < enemy.x) || (enemy.facing === 'right' && player.x > enemy.x)) && Math.abs(player.y - enemy.y) < 20;

        if (lineOfSight) {
            if (enemy.blocks >= 10) fireUltimate(enemy);
            else shoot(enemy);
        }
    }
}

function update(dt) {
    if (gameState !== 'PLAYING') { Object.assign(prevKeys, keys); return; }

    if (keys['r']) resetGame();
    if (player.hp <= 0 || enemy.hp <= 0) return;

    // Weapon Spawner Logic - Now includes minigun and sniper
    nextWeaponTimer -= dt;
    if (nextWeaponTimer <= 0 && weaponDrops.length < 3) {
        let p = platforms[Math.floor(Math.random() * (platforms.length - 1)) + 1];
        let types = ['shotgun', 'minigun', 'sniper'];
        let type = types[Math.floor(Math.random() * types.length)];
        let color = type === 'shotgun' ? '#00ff00' : (type === 'minigun' ? '#ff8800' : '#ff0000');
        
        weaponDrops.push({ x: p.x + p.w / 2, y: p.y - 12, w: 12, h: 12, type: type, color: color });
        nextWeaponTimer = 8 + Math.random() * 4; 
    }

    let dashKey = keys['c'] || keys['l'];
    let shootKey = keys['z'] || keys['j'];
    let shieldKey = keys['x'] || keys['k'];
    let jumpKey = keys['w'] || keys['arrowup'];
    let ultKey = keys['q'];

    if (ultKey && player.blocks >= 10) fireUltimate(player);
    if (dashKey && player.dashCd <= 0) { player.dashTime = DASH_DURATION; player.dashCd = DASH_COOLDOWN; }

    player.vx = 0;
    player.shielding = shieldKey && !shootKey; 

    if (player.dashTime > 0) {
        player.vx = player.facing === 'left' ? -DASH_SPEED : DASH_SPEED;
        player.vy = 0; player.dashTime -= dt; player.shielding = false; 
    } else {
        if (keys['a'] || keys['arrowleft']) { player.vx = -MOVE_SPEED; player.facing = 'left'; }
        if (keys['d'] || keys['arrowright']) { player.vx = MOVE_SPEED; player.facing = 'right'; }
        if (player.shielding && jumpKey) player.facing = 'up';
        if (player.shielding && (keys['s'] || keys['arrowdown'])) player.facing = 'down';

        let prevJumpKey = prevKeys['w'] || prevKeys['arrowup'];
        if (!player.shielding && jumpKey && !prevJumpKey) {
            if (player.grounded) { player.vy = JUMP_VELOCITY; player.jumps = 1; } 
            else if (player.onWall !== 0) {
                player.vy = JUMP_VELOCITY * 0.9;
                player.vx = player.onWall === -1 ? MOVE_SPEED * 1.5 : -MOVE_SPEED * 1.5;
            } 
            else if (player.jumps < 2) { player.vy = JUMP_VELOCITY * 0.8; player.jumps = 2; }
        }
    }

    if (shootKey && !player.shielding) shoot(player);

    player.cooldown -= dt; player.dashCd -= dt; enemy.cooldown -= dt;

    updatePhysics(player, dt);
    updateAI(dt);
    updatePhysics(enemy, dt);

    // Weapon Pickup Logic
    for (let i = weaponDrops.length - 1; i >= 0; i--) {
        let wd = weaponDrops[i];
        
        let equipWeapon = (entity) => {
            entity.weapon = wd.type;
            if (wd.type === 'shotgun') entity.ammo = 3;
            if (wd.type === 'minigun') entity.ammo = 50;
            if (wd.type === 'sniper') entity.ammo = 1;
        };

        if (rectIntersect(player, wd)) { equipWeapon(player); weaponDrops.splice(i, 1); continue; }
        if (rectIntersect(enemy, wd)) { equipWeapon(enemy); weaponDrops.splice(i, 1); continue; }
    }

    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx * dt;
        b.y += (b.vy || 0) * dt;

        let pShield = player.shielding ? getShieldRect(player) : null;
        let eShield = enemy.shielding ? getShieldRect(enemy) : null;

        if (pShield && rectIntersect(b, pShield) && b.owner !== player.color) { 
            if (b.isUltimate) { player.hp -= b.damage; bullets.splice(i, 1); continue; }
            player.blocks = Math.min(10, player.blocks + 1); 
            bullets.splice(i, 1); continue; 
        }
        if (eShield && rectIntersect(b, eShield) && b.owner !== enemy.color) { 
            if (b.isUltimate) { enemy.hp -= b.damage; bullets.splice(i, 1); continue; }
            enemy.blocks = Math.min(10, enemy.blocks + 1); 
            bullets.splice(i, 1); continue; 
        }

        if (b.owner !== player.color && rectIntersect(b, player)) { player.hp -= b.damage; bullets.splice(i, 1); continue; }
        if (b.owner !== enemy.color && rectIntersect(b, enemy)) { enemy.hp -= b.damage; bullets.splice(i, 1); continue; }
        if (b.x < -50 || b.x > canvas.width + 50 || b.y < -50 || b.y > canvas.height + 50) bullets.splice(i, 1);
    }

    Object.assign(prevKeys, keys);
}

function drawRect(rect, color) { ctx.fillStyle = color; ctx.fillRect(rect.x, rect.y, rect.w, rect.h); }

function drawPlayer(entity) {
    drawRect(entity, entity.dashTime > 0 ? 'white' : entity.color);
    if (entity.shielding) drawRect(getShieldRect(entity), entity === player ? '#00ffff' : '#ff8888');
    
    // Draw Sniper Laser Sight
    if (entity.weapon === 'sniper') {
        ctx.strokeStyle = 'rgba(255, 0, 0, 0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        let eyeOffsetX = entity.facing === 'right' ? entity.x + 10 : entity.x;
        ctx.moveTo(eyeOffsetX, entity.y + 5);
        ctx.lineTo(entity.facing === 'right' ? canvas.width : 0, entity.y + 5);
        ctx.stroke();
    }

    // Draw Weapon Text Indicator above head
    if (entity.weapon !== 'default') {
        ctx.fillStyle = entity.weapon === 'shotgun' ? '#00ff00' : (entity.weapon === 'minigun' ? '#ff8800' : '#ff0000');
        ctx.font = '10px Arial';
        ctx.fillText(`${entity.weapon.toUpperCase()}: ${entity.ammo}`, entity.x - 15, entity.y - 8);
    }
}

function drawHearts(x, y, hp, color) {
    ctx.fillStyle = color; ctx.font = '20px Arial';
    ctx.fillText('❤'.repeat(Math.max(0, hp)), x, y);
}

function drawUltimateBar(x, y, blocks, isReady) {
    ctx.fillStyle = '#444'; ctx.fillRect(x, y, 100, 10);
    if (isReady) {
        ctx.fillStyle = '#ff00ff'; ctx.fillRect(x, y, 100, 10);
        ctx.fillStyle = 'white'; ctx.font = '12px Arial'; ctx.fillText('ULT READY (Q)', x, y - 5);
    } else {
        ctx.fillStyle = '#00ffff'; ctx.fillRect(x, y, blocks * 10, 10);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (gameState === 'MENU' || gameState === 'CUSTOMIZE' || gameState === 'SETTINGS') return;

    platforms.forEach(p => drawRect(p, 'rgba(68, 68, 68, 0.8)'));
    weaponDrops.forEach(wd => drawRect(wd, wd.color)); 

    if (player.hp > 0) drawPlayer(player);
    if (enemy.hp > 0) drawPlayer(enemy);

    bullets.forEach(b => drawRect(b, b.isUltimate ? '#ff00ff' : '#ffff00')); 

    drawHearts(20, 30, player.hp, customBodyColor);
    drawUltimateBar(20, 50, player.blocks, player.blocks >= 10);

    drawHearts(canvas.width - 120, 30, enemy.hp, 'red');
    drawUltimateBar(canvas.width - 120, 50, enemy.blocks, enemy.blocks >= 10);

    if (player.dashCd > 0) {
        ctx.fillStyle = '#888'; ctx.font = '12px Arial'; ctx.fillText('Dash CD', 20, 80);
        ctx.fillRect(20, 85, 60 * (1 - (player.dashCd / DASH_COOLDOWN)), 4);
    }

    if (player.hp <= 0) { ctx.fillStyle = 'white'; ctx.font = '24px Arial'; ctx.fillText('RED WINS! Press R to Restart', 230, 300); }
    if (enemy.hp <= 0) { ctx.fillStyle = 'white'; ctx.font = '24px Arial'; ctx.fillText('BLUE WINS! Press R to Restart', 230, 300); }
}

function loop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    if (dt > 0.1) dt = 0.1;

    update(dt);
    draw();
    requestAnimationFrame(loop);
}

resetGame();
requestAnimationFrame(loop);
</script>
</body>
</html>
